<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Entry | CuePointe</title>
    <style>
        :root {
            --brand-gold: #D4AF37;
            --brand-black: #0a0a0a;
            --neon-green: #39FF14;
            --stadium-gray: #1a1a1a;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--brand-black);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .form-container {
            background: var(--stadium-gray);
            padding: 40px;
            border-radius: 12px;
            border: 2px solid var(--brand-gold);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
            width: 100%;
            max-width: 450px;
            margin: 20px;
            text-align: center; /* Centers the logo and header */
        }

        /* LOGO STYLING */
        .form-logo {
            max-width: 120px;
            margin-bottom: 20px;
            border-radius: 8px;
            background: #fff; /* White background makes the logo pop */
            padding: 5px;
            border: 2px solid var(--brand-gold);
        }

        .header h1 {
            font-size: 2.2rem;
            margin: 0;
            color: var(--brand-gold);
            letter-spacing: 2px;
        }

        .header p {
            color: var(--neon-green);
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .form-group {
            text-align: left; /* Keeps inputs easy to read */
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #bbb;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: 'Oswald', sans-serif;
        }

        input:focus {
            border-color: var(--neon-green);
            outline: none;
        }

        /* THE STYLISH CONFIRM BUTTON */
        .btn-confirm {
            width: 100%;
            padding: 18px;
            background: var(--brand-gold);
            color: black;
            border: none;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 0px #9e8229; /* 3D effect */
        }

        .btn-confirm:hover {
            background: var(--neon-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(57, 255, 20, 0.4);
            color: #000;
        }

        .btn-confirm:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #2a7a0a;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: #555;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .back-link:hover { color: var(--brand-gold); }
    </style>
</head>
<body>

    <div class="form-container">
        <img src="CuePointe_Logo.jpg" alt="CuePointe Logo" class="form-logo">

        <div class="header">
            <h1>PLAYER ENTRY</h1>
            <p>Sanctioned Action Pool Series</p>
        </div>

        <form>
            <div class="form-group">
                <label>Full Player Name</label>
                <input type="text" placeholder="ENTER NAME" required>
            </div>

            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="tel" placeholder="+256..." required>
            </div>

            <div class="form-group">
                <label>Preferred Venue</label>
                <select>
                    <option>Kabalagala Hub</option>
                    <option>Kansanga Hub</option>
                    <option>Tournament Special</option>
                </select>
            </div>

            <button type="submit" class="btn-confirm">CONFIRM REGISTRATION</button>
        </form>

        <a href="index.html" class="back-link">← EXIT REGISTRATION</a>
    </div>

</body>
</html>
